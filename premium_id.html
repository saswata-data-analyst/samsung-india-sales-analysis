<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Identity Card Matrix</title>
    <style>
        :root {
            --bg-color: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --primary: #00f2fe;
            --secondary: #4facfe;
            --accent: #ff007f;
            --text-main: #f3f4f6;
            --text-sub: #9ca3af;
        }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        /* Premium Glassmorphism Card Frame */
        .id-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            width: 380px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(79, 172, 254, 0.15);
            overflow: hidden;
            position: relative;
        }
        /* Card Header Graphic Badge */
        .card-header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            padding: 24px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .header-title {
            margin: 0;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 3px;
            color: #030712;
            text-transform: uppercase;
        }
        .system-status {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 9px;
            color: rgba(3, 7, 18, 0.6);
            font-weight: bold;
            font-family: monospace;
        }
        /* Card Body Content Layout */
        .card-body {
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        /* Avatar Node Frame */
        .profile-container {
            position: relative;
            margin-bottom: 20px;
        }
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(#1f2937, #111827);
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            object-fit: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .profile-pic svg {
            width: 50px;
            height: 50px;
            fill: var(--text-sub);
        }
        /* User Primary Meta Identification */
        .user-name {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 6px 0;
            letter-spacing: 1px;
            text-align: center;
            background: linear-gradient(to right, #ffffff, #e5e7eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-title {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
        }
        /* Data Matrix Grid Info Table */
        .info-grid {
            width: 100%;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
            margin-bottom: 25px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .info-label {
            color: var(--text-sub);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .info-value {
            color: var(--text-main);
            font-weight: 600;
            text-align: right;
        }
        /* Interactive Action Buttons */
        .action-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            box-sizing: border-box;
            width: 100%;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            color: #030712;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="id-card">
        <div class="card-header">
            <div class="system-status">SECURE NODE // ID-77</div>
            <h2 class="header-title">OFFICIAL ACCESS PASS</h2>
        </div>
        
        <div class="card-body">
            <div class="profile-container">
                <!-- Standard Placeholder Profile Vector SVG Node Graphic -->
                <div class="profile-pic">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16 v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
            </div>

            <div class="user-name" id="display-name">SASWATA MONDAL</div>
            <div class="user-title" id="display-profession">SYSTEMS ARCHITECT</div>

            <div class="info-grid">
                <div class="info-row"><span class="info-label">D.O.B</span><span class="info-value" id="display-dob">01-01-2002</span></div>
                <div class="info-row"><span class="info-label">Age</span><span class="info-value" id="display-age">24</span></div>
                <div class="info-row"><span class="info-label">University</span><span class="info-value" id="display-university">MAKAUT</span></div>
                <div class="info-row"><span class="info-label">Email</span><span class="info-value" id="display-email">saswatamondal156@gmail.com</span></div>
                <div class="info-row"><span class="info-label">WhatsApp</span><span class="info-value" id="display-whatsapp">+91 8337048490</span></div>
            </div>

            <div class="action-container">
                <button class="btn btn-primary" onclick="downloadVCard()">💾 SAVE TO PHONE CONTACTS</button>
                <button class="btn btn-secondary" onclick="window.print()">🖨️ EXPORT / SAVE DIGITAL CARD</button>
            </div>
        </div>
    </div>

    <script>
        // Dynamic Variable Injection Engine Protocol Configuration 
        const userData = {
            name: "Saswata Mondal",
            profession: "Data Analist",
            dob: "30-03-2003",
            age: "23",
            university: "University of Calcutta",
            email: "saswatamondal156@gmail.com",
            whatsapp: "8337048490"
        };

        // Automatic Action Trigger Handler mapping downloadable structured contact systems
        function downloadVCard() {
            const vcard = `BEGIN:VCARD\nVERSION:3.0\nN:${userData.name}\nFN:${userData.name}\nORG:${userData.university}\nTITLE:${userData.profession}\nTEL;TYPE=CELL,VOICE:${userData.whatsapp}\nEMAIL;TYPE=PREF,INTERNET:${userData.email}\nEND:VCARD`;
            const blob = new Blob([vcard], { type: 'text/vcard' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${userData.name.replace(" ", "_")}_Contact.vcf`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
